  experiment: [实验设计, 变量, 步骤, 结果, 关联假设, 更新记录]
  hypothesis: [陈述, 支持依据, 反驳依据, 验证状态, 更新记录]
  conclusion: [结论, 依据, 局限, 后续工作, 更新记录]

stable_types:
  - project
  - task
  - literature
  - experiment
  - dataset
  - hypothesis
  - conclusion
