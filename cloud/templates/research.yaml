key: research
label: 科研 / 项目管理
description: 项目 / 任务 / 文献 / 实验 / 数据 / 结论的研究知识库

wiki_dirs:
  - projects
  - tasks
  - literatures
  - experiments
  - datasets
  - hypotheses
  - conclusions
  - meetings
  - collaborators
  - notes
  - outputs

category_labels:
  projects: 项目
  tasks: 任务
  literatures: 文献
  experiments: 实验
  datasets: 数据集
  hypotheses: 假设
  conclusions: 结论
  meetings: 会议
  collaborators: 协作者
  notes: 笔记
  outputs: 问答记忆

type_directory_map:
  project: projects
  task: tasks
  literature: literatures
  experiment: experiments
  dataset: datasets
  hypothesis: hypotheses
  conclusion: conclusions
  meeting: meetings
  collaborator: collaborators
  note: notes
  output: outputs

template_type_files: {}

template_sections:
  project: [研究目标, 研究方法, 关联文献, 关联实验, 进度, 更新记录]
