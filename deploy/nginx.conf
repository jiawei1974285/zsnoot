# mjq-handynotes 服务器端 Nginx 站点配置
#
# 部署位置（Ubuntu/Debian）：
#   /etc/nginx/sites-available/mjq-cloud  →  软链到 sites-enabled/
# 部署位置（CentOS/RHEL）：
#   /etc/nginx/conf.d/mjq-cloud.conf
#
# 一站到底：
#   ① /                 → frontend/dist （SPA + history fallback）
#   ② /api/cloud/*      → 反向代理到 cloud:5005
#   ③ 不代理 /api/* 其它路径 —— 那些去往用户本机 agent，浏览器直连 127.0.0.1:5004

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # 临时阶段用 _ 接受所有 host；后续切域名改成 your-domain.com
    server_name _;

    # 前端构建产物
    root /opt/mjq-handynotes/frontend/dist;
    index index.html;

    client_max_body_size 64M;       # 文件上传上限（数据走本机不上云端，但保留以防）
    server_tokens off;              # 不暴露 Nginx 版本

    # 静态资源缓存（hashed 文件名）
    location ~* ^/assets/.*\.(?:js|css|woff2?|ttf|eot|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback：找不到的路径 fallback 给 index.html，让 vue-router 处理
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 云端 API 反代
    location /api/cloud/ {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # 不缓存 API 响应
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    # gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_vary on;

    # 健康检查暴露给负载均衡（可选）
    location = /healthz {
        proxy_pass http://127.0.0.1:5005/api/cloud/health;
        access_log off;
    }
}

# ────────────────────────────────────────────────────────
# 后续切 HTTPS 时（买完域名 + certbot）替换上面的 server 段为：
#
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     # ... 其余 location 段照搬 ...
# }
#
# 浏览器从 https 页面访问 http://127.0.0.1:5004 浏览器允许（mixed content 对
# localhost 例外），但需要本机 agent 也在 https 上的话要更复杂的方案。
# ────────────────────────────────────────────────────────
