llm:
  provider: openai
  temperature: 1
  max_tokens: 8000
  # 深度思考（DeepSeek V4 / Reasoner 等支持）；关闭时与现状完全一致
  thinking: false
  reasoning_effort: high   # low | medium | high；仅当 thinking=true 时生效
ingest:
  single_call: true
  max_tokens: 8000
  max_workers: 5
  # 同 sha256 的文件若已在历史批次成功入库 → 直接复用既有 wiki 页，不再调 LLM
  skip_unchanged: true
chat:
  # 关键词命中后沿 [[wiki-link]] 边走 N 跳，把强相关页拉进上下文
  graph_expand: true
  graph_hops: 1
  graph_max_added: 5
  # 上下文整体字符预算（之前硬编码 [:1000] 单页截断，长文档关键信息容易被切丢）
  # 默认按 10 页 × 单页 10000 字 / wiki_share 估算上限
  context_budget_chars: 150000
  # wiki 内容占预算的比例，其余给提示模板和查询本身（按字符算不引入 tiktoken 依赖）
  wiki_share: 0.75
  # 单页最大字符数（默认 10000，含截断标记前的正文）
  max_chars_per_page: 10000
embedding:
  enabled: false
  model: shibing624/text2vec-base-chinese
  dimensions: 768
watcher:
  inbox_dir: raw/inbox
  interval: 5
  supported_extensions:
  - .md
  - .txt
  - .docx
  - .pdf
  - .xlsx
  - .jpg
  - .png
wiki:
  wiki_dir: wiki
  embeddings_dir: embeddings
  auto_wikilink: true
  auto_extract: true
  default_categories:
  - persons
  - locations
  - organizations
  - events
  - evidence
  - case_summaries
  - crime_patterns
  - conclusions
  - outputs
  - notes
  - laws
  custom_categories:
  - key: type
    label: 违法犯罪类型
  - key: organization
    label: 组织机构
server:
  host: 0.0.0.0
  port: 5004
  debug: false
raw_dir: ''
first_run_done: true
vision_model:
  provider: ''
  model: ''
  base_url: ''
  api_key: ''
  temperature: 0.5
  max_tokens: 8000
  thinking: false
  reasoning_effort: high
ocr_model:
  provider: ''
  model: ''
  base_url: ''
  api_key: ''
  temperature: 0.5
  max_tokens: 8000
  thinking: false
  reasoning_effort: high
agent:
  skills:
  - enabled: true
    name: OCR 预检
    description: 识别图片、扫描 PDF、正文为空的材料
    trigger: 图片/扫描PDF/解析为空
  - enabled: true
    name: 实体分类
    description: 根据 schema 和自定义目录选择实体类型
    trigger: 入库生成 wiki 页面
